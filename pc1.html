<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="60">
  <title>PC1 Latest Capture</title>
</head>
<body>
  <img id="latest" src="capture_img/pc1/pc1_latest_capture.png?ts=0" alt="PC1 latest image">
  
  <script>
    const img = document.getElementById("latest");

    // 페이지 로드 시 캐시 무효화
    img.src = "capture_img/pc1/pc1_latest_capture.png?ts=" + Date.now();

    // 60초마다 이미지 src 갱신
    setInterval(() => {
      img.src = "capture_img/pc1/pc1_latest_capture.png?ts=" + Date.now();
    }, 60000);
  </script>
</body>
</html>
