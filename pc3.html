<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="60">
  <title>PC3 Latest Capture</title>
</head>
<body>
  <img id="latest" src="capture_img/pc3/pc3_latest_capture.png?ts=0" alt="PC3 latest image">
  
  <script>
    const img = document.getElementById("latest");
    img.src = "capture_img/pc3/pc3_latest_capture.png?ts=" + Date.now();

    setInterval(() => {
      img.src = "capture_img/pc3/pc3_latest_capture.png?ts=" + Date.now();
    }, 60000);
  </script>
</body>
</html>
